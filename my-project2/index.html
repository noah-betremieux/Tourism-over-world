<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My UI Kit - City Cards</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="banner">
        <div class="container">
            <h1>Visit the best countries of the world !!</h1>
            <h2>Explore our campuses all around the planet !</h2>
            <a href="#" class="btn-blue">Find now</a>
        </div>
    </div>

    <div class="container">
        <div class="cards">
            
            <div class="card">
                <img src="images/shanghai.jpg" alt="Shanghai">
                <h3>Shanghai</h3>
            </div>

            <div class="card">
                <img src="images/paris.jpg" alt="Paris">
                <h3>Paris</h3>
            </div>

            <div class="card">
                <img src="images/rio.jpg" alt="Rio">
                <h3>Rio</h3>
            </div>

        </div>
    </div>

</body>
</html>
